name: Healthcheck CI/CD

on:
  push:
    branches: [main]
    paths:
      - "infra/healthcheck/**"
      - ".github/workflows/deploy-healthcheck.yml"
  pull_request:
    paths:
      - "infra/healthcheck/**"
      - ".github/workflows/deploy-healthcheck.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: jko-healthcheck
  ECS_CLUSTER: jko-cluster
  ECS_SERVICE: jko-healthcheck
  CONTAINER_NAME: jko-healthcheck
  TASK_DEFINITION: infra/healthcheck/.aws/task-definition.json

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infra/healthcheck/requirements-dev.txt

      - name: Install dependencies
        working-directory: infra/healthcheck
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: infra/healthcheck
        run: pytest

  build-check:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: infra/healthcheck
          push: false
          load: true
          tags: jko-healthcheck:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Build & deploy
    needs: [test, build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: infra/healthcheck
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Substitute task definition placeholders
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          EC2_PRIVATE_IP: ${{ vars.EC2_PRIVATE_IP }}
        run: |
          sed -i "s|REPLACE_ACCOUNT_ID|${AWS_ACCOUNT_ID}|g" "$TASK_DEFINITION"
          sed -i "s|REPLACE_EC2_PRIVATE_IP|${EC2_PRIVATE_IP}|g" "$TASK_DEFINITION"

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
